<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desafio 2 js</title>
    <link rel="stylesheet" href="./assets/css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="flex flex-col text-white bg-gray-900 items-center gap-3">
    <h1 class="text-3xl font-bold text-center">Bienvenido</h1>
    <div class="container p-5 flex flex-col items-center gap-3">
      <h2 class="text-center text-xl">Reto Imagen</h2>
      <img
        class="planta w-50 rounded-lg h-auto"
        src="./assets/img/planta 2.jpg"
        alt="imagen de una planta"
      />
      <p class="text-sm">Haz click en la imagen</p>
    </div>
    <hr class="w-full border-gray-300" />
    <div class="container p-5 flex flex-col items-center gap-3">
      <h2 class="text-xl text-center">Reto Stickers</h2>
      <div class="flex items-center text-black gap-3">
        <div
          class="bg-indigo-500 shadow-md rounded-lg flex flex-col items-center gap-3 p-3"
        >
          <img
            class="w-50 rounded-lg h-auto"
            src="./assets/img/sticker1.jpg"
            alt="sticker 1"
          />
          <input
            id="sticker1"
            class="bg-white text-sky border border-gray-300 rounded w-10"
            type="number"
            placeholder="0"
          />
        </div>
        <div
          class="shadow-md rounded-lg bg-indigo-500 flex flex-col items-center gap-3 p-3"
        >
          <img
            class="w-50 rounded-lg h-auto"
            src="./assets/img/sticker2.jpg"
            alt="sticker 2"
          />
          <input
            id="sticker2"
            class="border text-sky border-gray-300 bg-white rounded w-10"
            type="number"
            placeholder="0"
          />
        </div>
        <div
          class="shadow-md rounded-lg bg-indigo-500 flex flex-col items-center gap-3 p-3"
        >
          <img
            class="w-50 rounded-lg h-auto"
            src="./assets/img/sticker3.jpg"
            alt="sticker 3"
          />
          <input
            id="sticker3"
            class="border border-gray-300 bg-white rounded w-10"
            type="number"
            placeholder="0"
          />
        </div>
      </div>
      <button id="pedirStickers" class="bg-white text-black font-medium rounded-lg m-3 p-1 px-4 cursor-pointer hover:bg-indigo-400 hover:text-white">Pedir stickers</button>
      <p class="cantidadStickers text-center">
        Cantidad de stickers: <span class="cantidad">0</span>
      </p>
    </div>
    <hr class="w-full border-gray-300" />
    <div class="container p-5 flex flex-col items-center gap-3">
      <h2 class="text-xl text-center">Reto password</h2>
      <h3>Ingrese el Password</h3>
      <div>
        <select name="primerNumero" id="numeroUno">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
        </select>
        <select name="segundoNumero" id="numeroDos">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
        </select>
        <select name="tercerNumero" id="numeroTres">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
        </select>
      </div>
    </div>
    <script src="./assets/js/script.js"></script>
  </body>
</html>
